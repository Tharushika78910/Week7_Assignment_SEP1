services:
  db:
    image: mariadb:11
    container_name: calculator-db
    environment:
      MYSQL_ROOT_PASSWORD: Dilmi2000@
      MYSQL_DATABASE: calc_data
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -pDilmi2000@ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    container_name: calculator-app
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: